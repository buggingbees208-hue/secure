<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | ShopSecure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1350') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .card h2 { margin-bottom: 25px; color: #2c3e50; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #27ae60; box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover { background: #219150; transform: translateY(-2px); }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link { 
            margin-top: 25px; 
            font-size: 13px; 
            color: #666; 
        }

        .login-link a { 
            color: #2980b9; 
            text-decoration: none; 
            font-weight: 600; 
        }
        
        .login-link a:hover { text-decoration: underline; }

        #status-msg { font-size: 12px; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 45px; margin-bottom: 10px;">🔐</div>
        <h2>Join ShopSecure</h2>

        <input type="text" id="signup_name" placeholder="Full Name">
        <input type="email" id="signup_email" placeholder="Email Address">
        <input type="password" id="signup_password" placeholder="Create Password" maxlength="50">
        
        <button id="signup_btn" type="button" onclick="signupProcess()">Create Account</button>
        
        <p id="status-msg" style="display:none; color: #27ae60;">
            Verifying details...
        </p>

        <p class="login-link">
            Already have an account? 
            <a href="login.html">Login Securely</a>
        </p>
    </div>

    <script>
        const API = "https://secure-atb1.onrender.com";

        async function signupProcess() {
            const nameInput = document.getElementById("signup_name");
            const emailInput = document.getElementById("signup_email");
            const passwordInput = document.getElementById("signup_password");
            const statusMsg = document.getElementById("status-msg");
            const button = document.getElementById("signup_btn");

            const name = nameInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            // Simple validations
            if (!name || !email || !password) {
                alert("Please complete all fields to secure your account.");
                return;
            }

            if (password.length < 6) {
                alert("Security Tip: Password should be at least 6 characters.");
                return;
            }

            button.disabled = true;
            button.innerText = "Processing...";
            statusMsg.style.display = "block";

            try {
                const response = await fetch(`${API}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        name: name,
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Account Created Successfully! 🎉\nYou can now log in.");
                    window.location.href = "login.html";
                } else {
                    alert("Signup Failed: " + (result.detail || "This email might already be registered."));
                    button.disabled = false;
                    button.innerText = "Create Account";
                    statusMsg.style.display = "none";
                }

            } catch (err) {
                button.disabled = false;
                button.innerText = "Create Account";
                statusMsg.style.display = "none";
                alert("Network Error: Could not connect to the security server.");
            }
        }
    </script>

</body>
</html>
